<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Baldi Item Dither Converter</title>

  <style>
    body {
      background: #222;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #7cff4f;
    }

    canvas {
      margin-top: 20px;
      border: 3px solid #7cff4f;
      image-rendering: pixelated;
      max-width: 90%;
      background: transparent;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      background: #7cff4f;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Baldi Item Dither Converter</h1>

  <input type="file" id="upload" accept="image/*">
  <br>

  <canvas id="canvas"></canvas>
  <br>

  <button id="download">Download PNG</button>

  <script>
    const upload = document.getElementById("upload");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const downloadBtn = document.getElementById("download");

    upload.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        const img = new Image();

        img.onload = function() {
          canvas.width = img.width;
          canvas.height = img.height;

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);

          applyDither();
        };

        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    });

    function applyDither() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      const matrix = [
        [0, 8, 2, 10],
        [12, 4, 14, 6],
        [3, 11, 1, 9],
        [15, 7, 13, 5]
      ];

      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const i = (y * canvas.width + x) * 4;

          const a = data[i + 3];
          if (a === 0) continue;

          let r = data[i];
          let g = data[i + 1];
          let b = data[i + 2];

          const threshold = matrix[y % 4][x % 4] * 8;

          r = Math.floor((r + threshold) / 64) * 64;
          g = Math.floor((g + threshold) / 64) * 64;
          b = Math.floor((b + threshold) / 64) * 64;

          data[i] = Math.floor(r * 0.82);
          data[i + 1] = Math.floor(g * 0.82);
          data[i + 2] = Math.floor(b * 0.82);
          data[i + 3] = a;
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    // DOWNLOAD + FALLBACK
    downloadBtn.addEventListener("click", function() {
      if (!canvas.width || !canvas.height) {
        alert("Upload an image first!");
        return;
      }

      const imageURL = canvas.toDataURL("image/png");

      // tenta baixar
      const link = document.createElement("a");
      link.href = imageURL;
      link.download = "baldi-item-dither.png";
      link.click();

      // fallback: abre em nova aba
      const newTab = window.open();
      if (newTab) {
        newTab.document.write('<img src="' + imageURL + '" style="max-width:100%;">');
      }
    });
  </script>

</body>
</html>
